<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProNutro — CRM</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #07090f;
      --s1: #0d1117;
      --s2: #131920;
      --s3: #1a2230;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.1);
      --text: #e2e8f5;
      --text2: #7a8899;
      --text3: #3d4a5c;

      --c-novo: #3b82f6;
      --c-qual: #a855f7;
      --c-agend: #f59e0b;
      --c-conf: #10b981;
      --c-comp: #06b6d4;
      --c-no: #ef4444;

      --g-novo: linear-gradient(135deg, #1e3a5f, #0d1f3c);
      --g-qual: linear-gradient(135deg, #3b1f5e, #1e0d3c);
      --g-agend: linear-gradient(135deg, #5c3d0a, #2e1e05);
      --g-conf: linear-gradient(135deg, #0a3d2b, #051e15);
      --g-comp: linear-gradient(135deg, #073a45, #031e24);
      --g-no: linear-gradient(135deg, #4a1010, #260808);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 0%, rgba(59, 130, 246, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(168, 85, 247, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 9, 15, 0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo-text span {
      color: var(--c-novo);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refresh-btn {
      background: var(--s2);
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover {
      color: var(--text);
      border-color: var(--c-novo);
    }

    .refresh-btn.loading .spin {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .last-update {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
    }

    /* METRICS */
    .metrics {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 20px 32px 0;
    }

    .metric-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    .metric-card:hover {
      border-color: var(--border2);
    }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .metric-value.money {
      font-size: 22px;
      font-family: 'JetBrains Mono', monospace;
    }

    .metric-sub {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .metric-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
      margin-top: 4px;
    }

    /* FUNIL BAR */
    .funil-bar {
      position: relative;
      z-index: 1;
      margin: 16px 32px 0;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .funil-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      white-space: nowrap;
    }

    .funil-track {
      flex: 1;
      height: 8px;
      background: var(--s3);
      border-radius: 99px;
      display: flex;
      overflow: hidden;
      gap: 1px;
    }

    .funil-seg {
      height: 100%;
      transition: width 0.5s ease;
      border-radius: 1px;
    }

    .funil-legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .funil-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
    }

    .funil-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* KANBAN */
    .kanban-wrapper {
      position: relative;
      z-index: 1;
      padding: 16px 32px 32px;
      overflow-x: auto;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(6, minmax(240px, 1fr));
      gap: 12px;
      min-width: 1500px;
    }

    .column {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 320px);
    }

    .col-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    .col-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .col-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .col-name {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .col-count {
      background: var(--s3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--s3) transparent;
    }

    /* CARD */
    .card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: default;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
      background: var(--col-color);
      border-radius: 3px 0 0 3px;
    }

    .card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .card-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      padding-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0 3px 8px;
    }

    .card-icon {
      font-size: 11px;
      width: 14px;
      text-align: center;
      color: var(--text3);
    }

    .card-val {
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'JetBrains Mono', monospace;
    }

    .card-val.highlight {
      color: var(--col-color);
      font-weight: 600;
    }

    .card-footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 8px;
    }

    .card-time {
      font-size: 10px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-time.urgent {
      color: #ef4444;
    }

    .card-time.warn {
      color: #f59e0b;
    }

    .card-valor-badge {
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      padding: 2px 7px;
      border-radius: 6px;
    }

    /* EMPTY */
    .col-empty {
      text-align: center;
      padding: 30px 10px;
      color: var(--text3);
      font-size: 12px;
    }

    .col-empty-icon {
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.3;
    }

    /* LOADING */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text3);
      flex-direction: column;
      gap: 12px;
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 2px solid var(--s3);
      border-top-color: var(--c-novo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* CONFIG MODAL */
    .config-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .config-overlay.open {
      display: flex;
    }

    .config-modal {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      width: 420px;
      position: relative;
    }

    .config-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .config-field {
      margin-bottom: 14px;
    }

    .config-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .config-field input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
    }

    .config-field input:focus {
      border-color: var(--c-novo);
    }

    .config-save {
      width: 100%;
      background: var(--c-novo);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }

    .config-save:hover {
      opacity: 0.85;
    }

    .config-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    /* STATUS SELECT */
    .status-select {
      appearance: none;
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
    }

    .status-select:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    @media (max-width:768px) {
      .metrics {
        grid-template-columns: 1fr 1fr;
      }

      header,
      .metrics,
      .funil-bar,
      .kanban-wrapper {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- CONFIG MODAL -->
  <div class="config-overlay" id="configOverlay">
    <div class="config-modal">
      <button class="config-close" onclick="closeConfig()">✕</button>
      <div class="config-title">⚙️ Configuração do Sistema</div>
      <div class="config-field">
        <label>URL do Workflow IA (Opcional)</label>
        <input type="text" id="cfgWorkflow" placeholder="https://n8n.seusistema.com/webhook/..." />
      </div>
      <div class="config-field">
        <label>URL do Supabase</label>
        <input type="text" id="cfgUrl" placeholder="https://xxxx.supabase.co" />
      </div>
      <div class="config-field">
        <label>Anon Key</label>
        <input type="text" id="cfgKey" placeholder="eyJhbGciOiJ..." />
      </div>
      <button class="config-save" onclick="saveConfig()">Salvar e Conectar</button>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">P</div>
      <div class="logo-text">Pro<span>Nutro</span> CRM</div>
    </div>
    <div class="header-right">
      <div class="last-update" id="lastUpdate">—</div>
      <button class="refresh-btn" onclick="loadData()">
        <span class="spin" id="spinIcon">↻</span> Atualizar
      </button>
      <button class="refresh-btn" onclick="openConfig()">⚙️ Config</button>
    </div>
  </header>

  <!-- METRICS -->
  <div class="metrics">
    <div class="metric-card" style="--accent:var(--c-novo)">
      <div class="metric-label">Leads Hoje</div>
      <div class="metric-value" id="mLeadsHoje">—</div>
      <div class="metric-sub" id="mLeadsTotal">— total</div>
    </div>
    <div class="metric-card" style="--accent:var(--c-agend)">
      <div class="metric-label">Agendados</div>
      <div class="metric-value" id="mAgendados">—</div>
      <div class="metric-sub" id="mConfirmados">— confirmados</div>
    </div>
    <div class="metric-card" style="--accent:var(--c-conf)">
      <div class="metric-label">Taxa Conversão</div>
      <div class="metric-value" id="mTaxa">—</div>
      <div class="metric-badge" id="mTaxaBadge">leads → agendados</div>
    </div>
    <div class="metric-card" style="--accent:#10b981">
      <div class="metric-label">Receita Prevista</div>
      <div class="metric-value money" id="mReceita">—</div>
      <div class="metric-sub" id="mReceitaSub">agendados + confirmados</div>
    </div>
  </div>

  <!-- FUNIL BAR -->
  <div class="funil-bar">
    <div class="funil-label">Funil</div>
    <div class="funil-track" id="funilTrack"></div>
    <div class="funil-legend" id="funilLegend"></div>
  </div>

  <!-- KANBAN -->
  <div class="kanban-wrapper">
    <div class="kanban" id="kanban">
      <div class="loading-state" style="grid-column:1/-1">
        <div class="loader"></div>
        <div>Carregando dados...</div>
      </div>
    </div>
  </div>

  <script>
    const COLS = [
      { key: 'novo_lead', label: 'Novo Lead', color: 'var(--c-novo)', grad: 'var(--g-novo)' },
      { key: 'qualificado', label: 'Qualificado', color: 'var(--c-qual)', grad: 'var(--g-qual)' },
      { key: 'agendado', label: 'Agendado', color: 'var(--c-agend)', grad: 'var(--g-agend)' },
      { key: 'confirmado', label: 'Confirmado', color: 'var(--c-conf)', grad: 'var(--g-conf)' },
      { key: 'compareceu', label: 'Compareceu', color: 'var(--c-comp)', grad: 'var(--g-comp)' },
      { key: 'no_show', label: 'No-Show', color: 'var(--c-no)', grad: 'var(--g-no)' },
    ];

    // Config
    let SUPA_URL = localStorage.getItem('pn_url') || '';
    let SUPA_KEY = localStorage.getItem('pn_key') || '';
    let WORKFLOW_URL = localStorage.getItem('pn_workflow_url') || '';

    // Se não tem config, usa os novos acessos ProNutro
    if (!SUPA_URL) {
      SUPA_URL = 'https://iopdfbsndijehdqowfmj.supabase.co';
      SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcGRmYnNuZGlqZWhkdW93Zm1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIwMjc5NjgsImV4cCI6MjA3NzYwMzk2OH0.5aoRsDS-WFeemjqnESeTyjvdt03abNsUyO-HJdgj3FE';
      WORKFLOW_URL = 'http://n8n-eoc8scc4w4w8ccco4os0ocgg.31.97.240.160.sslip.io/webhook/pronutro-saas3';
    }

    function openConfig() {
      document.getElementById('cfgUrl').value = SUPA_URL;
      document.getElementById('cfgKey').value = SUPA_KEY;
      document.getElementById('cfgWorkflow').value = WORKFLOW_URL;
      document.getElementById('configOverlay').classList.add('open');
    }
    function closeConfig() {
      document.getElementById('configOverlay').classList.remove('open');
    }
    function saveConfig() {
      SUPA_URL = document.getElementById('cfgUrl').value.trim();
      SUPA_KEY = document.getElementById('cfgKey').value.trim();
      WORKFLOW_URL = document.getElementById('cfgWorkflow').value.trim();
      localStorage.setItem('pn_url', SUPA_URL);
      localStorage.setItem('pn_key', SUPA_KEY);
      localStorage.setItem('pn_workflow_url', WORKFLOW_URL);
      closeConfig();
      loadData();
    }

    // Time helpers
    function timeAgo(dateStr) {
      if (!dateStr) return '—';
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (m < 1) return 'agora';
      if (m < 60) return `${m}min`;
      if (h < 24) return `${h}h`;
      return `${d}d`;
    }

    function urgencyClass(dateStr) {
      if (!dateStr) return '';
      const h = (Date.now() - new Date(dateStr).getTime()) / 3600000;
      if (h > 24) return 'urgent';
      if (h > 8) return 'warn';
      return '';
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ' ' +
        d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function fmtMoney(val) {
      if (!val && val !== 0) return '—';
      return 'R$ ' + Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 0 });
    }

    // Fetch leads
    async function fetchLeads() {
      // Se houver Workflow URL, tenta carregar dela primeiro
      if (WORKFLOW_URL) {
        const res = await fetch(WORKFLOW_URL);
        if (!res.ok) throw new Error(`Workflow HTTP ${res.status}`);
        return res.json();
      }

      const url = `${SUPA_URL}/rest/v1/leads?select=*&order=created_at.desc&limit=500`;
      const res = await fetch(url, {
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`
        }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // Update lead status
    async function updateStatus(id, status) {
      const url = `${SUPA_URL}/rest/v1/leads?id=eq.${id}`;
      await fetch(url, {
        method: 'PATCH',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status, updated_at: new Date().toISOString() })
      });
      loadData();
    }

    // Render metrics
    function renderMetrics(leads) {
      const today = new Date().toDateString();
      const leadsHoje = leads.filter(l => new Date(l.created_at).toDateString() === today).length;
      const agendados = leads.filter(l => ['agendado', 'confirmado'].includes(l.status)).length;
      const confirmados = leads.filter(l => l.status === 'confirmado').length;
      const total = leads.length;
      const taxa = total > 0 ? Math.round((agendados / total) * 100) : 0;
      const receita = leads
        .filter(l => ['agendado', 'confirmado'].includes(l.status))
        .reduce((s, l) => s + (Number(l.valor) || 0), 0);

      document.getElementById('mLeadsHoje').textContent = leadsHoje;
      document.getElementById('mLeadsTotal').textContent = `${total} total`;
      document.getElementById('mAgendados').textContent = agendados;
      document.getElementById('mConfirmados').textContent = `${confirmados} confirmados`;
      document.getElementById('mTaxa').textContent = `${taxa}%`;
      document.getElementById('mReceita').textContent = fmtMoney(receita);
    }

    // Render funil bar
    function renderFunil(leads) {
      const total = leads.length || 1;
      const track = document.getElementById('funilTrack');
      const legend = document.getElementById('funilLegend');
      track.innerHTML = '';
      legend.innerHTML = '';

      COLS.forEach(col => {
        const count = leads.filter(l => l.status === col.key).length;
        const pct = (count / total * 100).toFixed(1);
        const seg = document.createElement('div');
        seg.className = 'funil-seg';
        seg.style.cssText = `width:${pct}%; background:${col.color};`;
        track.appendChild(seg);

        legend.innerHTML += `
      <div class="funil-item">
        <div class="funil-dot" style="background:${col.color}"></div>
        <span>${col.label}: ${count}</span>
      </div>`;
      });
    }

    // Render card
    function renderCard(lead, colColor) {
      const statusOpts = COLS.map(c =>
        `<option value="${c.key}" ${c.key === lead.status ? 'selected' : ''}>${c.label}</option>`
      ).join('');

      return `
    <div class="card" style="--col-color:${colColor}">
      <div class="card-name">${lead.nome || 'Cliente'}</div>
      <div class="card-row">
        <span class="card-icon">📞</span>
        <span class="card-val">${lead.telefone || '—'}</span>
      </div>
      ${lead.medico ? `
      <div class="card-row">
        <span class="card-icon">⚕️</span>
        <span class="card-val highlight">${lead.medico}</span>
      </div>` : ''}
      ${lead.data_consulta ? `
      <div class="card-row">
        <span class="card-icon">📅</span>
        <span class="card-val">${fmtDate(lead.data_consulta)}</span>
      </div>` : ''}
      <div class="card-footer">
        <span class="card-time ${urgencyClass(lead.created_at)}">${timeAgo(lead.created_at)}</span>
        <div style="display:flex;align-items:center;gap:6px">
          ${lead.valor ? `<span class="card-valor-badge">${fmtMoney(lead.valor)}</span>` : ''}
          <select class="status-select" onchange="updateStatus('${lead.id}',this.value)">
            ${statusOpts}
          </select>
        </div>
      </div>
    </div>`;
    }

    // Render kanban
    function renderKanban(leads) {
      const kanban = document.getElementById('kanban');
      kanban.innerHTML = '';

      COLS.forEach(col => {
        const colLeads = leads.filter(l => l.status === col.key);
        const div = document.createElement('div');
        div.className = 'column';
        div.innerHTML = `
      <div class="col-header" style="border-top:2px solid ${col.color}">
        <div class="col-header-left">
          <div class="col-dot" style="background:${col.color}"></div>
          <div class="col-name" style="color:${col.color}">${col.label}</div>
        </div>
        <div class="col-count">${colLeads.length}</div>
      </div>
      <div class="col-body">
        ${colLeads.length === 0
            ? `<div class="col-empty"><div class="col-empty-icon">○</div>Vazio</div>`
            : colLeads.map(l => renderCard(l, col.color)).join('')
          }
      </div>`;
        kanban.appendChild(div);
      });
    }

    // Main load
    let isLoading = false;
    async function loadData() {
      if (isLoading) return;
      isLoading = true;
      document.getElementById('spinIcon').style.animation = 'spin 0.8s linear infinite';

      try {
        const leads = await fetchLeads();
        renderMetrics(leads);
        renderFunil(leads);
        renderKanban(leads);
        const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('lastUpdate').textContent = `atualizado ${now}`;
      } catch (err) {
        document.getElementById('kanban').innerHTML = `
      <div class="loading-state" style="grid-column:1/-1">
        <div style="font-size:32px">⚠️</div>
        <div>Erro ao carregar: ${err.message}</div>
        <button class="refresh-btn" onclick="openConfig()">⚙️ Configurar</button>
      </div>`;
      } finally {
        isLoading = false;
        document.getElementById('spinIcon').style.animation = '';
      }
    }

    // Auto-refresh 30s
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>

</html>
